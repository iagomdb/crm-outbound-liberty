name: crm

# Produção. Sobe na VPS com:
#   docker compose -f compose.prod.yaml up -d --build
#
# Diferenças pro compose.yaml (dev):
#  - web usa o estágio "runner" do Dockerfile (build standalone, sem hot-reload)
#  - sem bind mount do código, sem adminer exposto
#  - Caddy na frente termina TLS e faz proxy reverso pro web (HTTPS automático)
#  - web e db NÃO publicam portas no host: só o Caddy fica exposto (80/443)

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crm}
      NODE_ENV: production
      TZ: America/Sao_Paulo
      # Com HTTPS na frente (Caddy), o cookie seguro funciona — deixe sem AUTH_COOKIE_SECURE.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?defina DOMAIN no .env (ex.: crm.seudominio.com.br)}
      ACME_EMAIL: ${ACME_EMAIL:?defina ACME_EMAIL no .env (email pro Let's Encrypt)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
