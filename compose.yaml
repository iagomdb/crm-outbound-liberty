name: crm

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    ports:
      # host já usa 5432 (Postgres local) → publicamos em 5433. Container segue em 5432.
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Dentro da rede do compose o banco é o host "db"
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm}@db:5432/${POSTGRES_DB:-crm}
      NODE_ENV: development
      TZ: America/Sao_Paulo # golden-hours e horários no fuso certo
    ports:
      - "3000:3000"
    volumes:
      - .:/app # hot-reload do código
      - /app/node_modules # preserva o node_modules da imagem (musl)
      - /app/.next # build do container, isolado do host
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  pgdata:
